<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main}">
<head>
	<title>無存取權限</title>
	
	<th:block layout:fragment="page-css">
		<link rel="stylesheet" th:href="@{/static/css/pages/403/403.css}" th:nonce="${cspNonce}">
	</th:block>
	
</head>
<body>
	<div layout:fragment="page-content">
		<div class="error-page">
			<div class="error-page-icon">
				<i class="bi bi-shield-exclamation"></i>
			</div>
			<h1 class="error-page-code">403</h1>
			<h2 class="error-page-title">您沒有存取此功能的權限</h2>
			<p class="error-page-desc"
				th:text="${errorMessage ?: '如需存取此功能，請洽系統管理員申請相關權限。'}"></p>
			<div class="error-page-actions">
				<a th:href="@{/dashboard}" class="btn btn-primary btn-sm"> <i
					class="bi bi-house me-1"></i>回首頁
				</a>
				<button onclick="history.back()"
					class="btn btn-outline-secondary btn-sm">
					<i class="bi bi-arrow-left me-1"></i>回上一頁
				</button>
			</div>
		</div>
	</div>
	
	<th:block layout:fragment="page-js">
		<script th:src="@{/static/js/pages/403/403.js}" th:nonce="${cspNonce}"></script>
	</th:block>
	
</body>
</html>
