<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<!--/* 快取設定 */-->
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Expires" content="0">
	
	<title>系統登入 | 公務管理系統</title>

	<link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
	<link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
	<link rel="stylesheet" th:href="@{/css/base/tokens.css}">
	<link rel="stylesheet" th:href="@{/css/pages/login/login.css}">
</head>
<body class="login-body">

	<div class="login-root">

		<!-- ── 左側品牌區 ── -->
		<div class="login-brand" aria-hidden="true">
			<div class="login-brand-inner">
				<div class="login-brand-logo">
					<i class="bi bi-building-fill-gear"></i>
				</div>
				<h1 class="login-brand-title">
					公務人員<br />管理資訊系統
				</h1>
				<p class="login-brand-desc">
					整合人事、業務、資源管理，<br />提升行政效能與資訊透明度。
				</p>
				<div class="login-brand-dots" aria-hidden="true">
					<span class="dot dot--active"></span> <span class="dot"></span> <span
						class="dot"></span>
				</div>
			</div>
			<div class="login-brand-deco" aria-hidden="true">
				<span class="deco-circle deco-circle--1"></span> <span
					class="deco-circle deco-circle--2"></span> <span class="deco-grid"></span>
			</div>
		</div>

		<!-- ── 右側登入表單 ── -->
		<div class="login-main">
			<div class="login-card">

				<!-- 手機版 logo -->
				<div class="login-card-mobile-logo d-md-none">
					<i class="bi bi-building-fill-gear"></i>
				</div>

				<div class="login-card-header">
					<h2 class="login-card-title">系統登入</h2>
					<p class="login-card-subtitle">請輸入您的帳號與密碼</p>
				</div>

				<!-- 訊息提示 -->
				<div th:if="${errorMsg}"
					class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2 py-2"
					role="alert">
					<i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i> <span
						th:text="${errorMsg}"></span>
					<button type="button" class="btn-close ms-auto"
						data-bs-dismiss="alert" aria-label="關閉"></button>
				</div>
				<div th:if="${successMsg}"
					class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2 py-2"
					role="alert">
					<i class="bi bi-check-circle-fill flex-shrink-0"></i> <span
						th:text="${successMsg}"></span>
					<button type="button" class="btn-close ms-auto"
						data-bs-dismiss="alert" aria-label="關閉"></button>
				</div>

				<!-- 登入表單 -->
				<form th:action="@{/login}" method="post" class="login-form"
					id="loginForm" autocomplete="off" novalidate>

					<input type="hidden" th:name="${_csrf.parameterName}"
						th:value="${_csrf.token}" />

					<!-- 帳號 -->
					<div class="form-floating mb-3">
						<input type="text" class="form-control" id="username"
							name="username" placeholder="帳號" required autofocus
							autocomplete="username" /> <label for="username"> <i
							class="bi bi-person me-1"></i>帳號
						</label>
					</div>

					<!-- 密碼 -->
					<div class="form-floating mb-2 position-relative">
						<input type="password" class="form-control" id="password"
							name="password" placeholder="密碼" required
							autocomplete="current-password" /> <label for="password">
							<i class="bi bi-lock me-1"></i>密碼
						</label>
						<button type="button" class="login-pwd-toggle" id="togglePwd"
							aria-label="顯示或隱藏密碼">
							<i class="bi bi-eye" id="togglePwdIcon"></i>
						</button>
					</div>

					<!-- 記住帳號 / 忘記密碼 -->
					<div class="d-flex justify-content-between align-items-center mb-4">
						<div class="form-check mb-0">
							<input class="form-check-input" type="checkbox" id="rememberMe"
								name="remember-me">
								<label class="form-check-label login-remember-label" for="rememberMe">
								記住帳號 </label>
						</div>
						<a th:href="@{/forgot-password}" class="login-text-link">忘記密碼？</a>
					</div>

					<!-- 登入按鈕 -->
					<button type="submit" class="login-submit-btn w-100" id="loginBtn">
						<span class="login-submit-text"> <i
							class="bi bi-box-arrow-in-right me-2"></i>登入系統
						</span> <span class="login-submit-loading d-none"> <span
							class="spinner-border spinner-border-sm me-2" role="status"
							aria-hidden="true"></span> 登入中，請稍候…
						</span>
					</button>
				</form>

				<!-- 說明文字 -->
				<div class="login-card-footer">
					<p class="login-card-footer-text text-center">
						如有帳號問題，請洽系統管理員<br /> <span class="login-card-footer-note">本系統僅供授權人員使用，未授權存取將依法追究責任</span>
					</p>
				</div>
			</div>

			<p class="login-copyright">
				© <span th:text="${#dates.year(#dates.createNow())}">2025</span>
				公務人員管理資訊系統 &nbsp;|&nbsp; v1.0.0
			</p>
		</div>
	</div>
	
	<script th:src="@{/webjars/jquery/jquery.min.js}" th:nonce="${cspNonce}"></script>
	<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" th:nonce="${cspNonce}"></script>
	<script th:src="@{/js/pages/login/login.js}" th:nonce="${cspNonce}"></script>
	
</body>
</html>
